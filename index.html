<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>muzima — stream the sound</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-brand">
        <svg class="logo-icon" viewBox="0 0 32 32" width="32" height="32">
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff2d55"/>
              <stop offset="50%" stop-color="#5856d6"/>
              <stop offset="100%" stop-color="#007aff"/>
            </linearGradient>
          </defs>
          <circle cx="16" cy="16" r="14" fill="none" stroke="url(#logo-grad)" stroke-width="2.5"/>
          <circle cx="16" cy="16" r="4" fill="url(#logo-grad)"/>
          <path d="M16 12 L16 4 M16 20 L16 28 M12 16 L4 16 M20 16 L28 16" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">muzima</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#home" class="nav-item active" data-view="home">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span>Home</span>
        </a>
        <a href="#browse" class="nav-item" data-view="browse">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
          <span>Browse</span>
        </a>
        <a href="#search" class="nav-item" data-view="search">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <span>Search</span>
        </a>
      </nav>

      <div class="sidebar-section">
        <h3 class="sidebar-section-title">Library</h3>
        <div class="library-items" id="library-items">
          <div class="library-item">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
            <span>Recently Played</span>
          </div>
          <div class="library-item">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
            <span>Favorites</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-section-title">Playlists</h3>
        <div class="library-items" id="playlist-items">
          <div class="library-item empty-state">No playlists yet</div>
        </div>
      </div>

      <div class="sidebar-footer">
        <span class="sidebar-footer-text">muzima v1.0</span>
      </div>
    </aside>

    <div id="main-column">
      <header id="top-bar">
        <button id="mobile-menu-btn" class="mobile-only">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 id="page-title">Home</h1>
        <div class="top-bar-actions">
          <button id="theme-toggle" class="icon-btn" title="Toggle theme">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
          </button>
        </div>
      </header>

      <main id="main-content">
        <div id="view-container"></div>
      </main>

      <footer id="player-bar" class="hidden">
      <div class="player-track-info">
        <div class="player-art-wrapper">
          <img id="player-art" src="" alt="Album art">
          <div class="player-art-overlay"></div>
        </div>
        <div class="player-track-text">
          <span id="player-title" class="player-title">No track</span>
          <span id="player-artist" class="player-artist">Select a song to play</span>
        </div>
        <div class="player-visualizer" id="player-visualizer">
          <div class="viz-bar"></div>
          <div class="viz-bar"></div>
          <div class="viz-bar"></div>
          <div class="viz-bar"></div>
          <div class="viz-bar"></div>
          <div class="viz-bar"></div>
          <div class="viz-bar"></div>
          <div class="viz-bar"></div>
        </div>
        <button id="player-like-btn" class="icon-btn player-like" title="Like">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
        </button>
      </div>

      <div class="player-center">
        <div class="player-controls">
          <button id="shuffle-btn" class="control-btn" title="Shuffle">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/>
              <line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/>
              <line x1="15" y1="15" x2="21" y2="21"/>
              <line x1="4" y1="4" x2="9" y2="9"/>
            </svg>
          </button>
          <button id="prev-btn" class="control-btn" title="Previous">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M19 20L9 12l10-8v16zM5 19V5h2v14H5z"/>
            </svg>
          </button>
          <button id="play-btn" class="control-btn play-btn-main" title="Play">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <polygon points="8,5 19,12 8,19"/>
            </svg>
          </button>
          <button id="next-btn" class="control-btn" title="Next">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M5 4l10 8-10 8V4zM17 5v14h2V5h-2z"/>
            </svg>
          </button>
          <button id="repeat-btn" class="control-btn" title="Repeat">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 014-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 01-4 4H3"/>
            </svg>
          </button>
        </div>
        <div class="player-progress">
          <span id="current-time" class="time-display">0:00</span>
          <div class="progress-track">
            <input type="range" id="seek-slider" min="0" max="100" value="0" step="0.1">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            <div class="progress-thumb" id="progress-thumb" style="left: 0%"></div>
          </div>
          <span id="duration" class="time-display">0:00</span>
        </div>
      </div>

      <div class="player-right">
        <button id="lyrics-btn" class="icon-btn" title="Lyrics">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <div class="volume-control">
          <button id="volume-btn" class="icon-btn" title="Volume">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
            </svg>
          </button>
          <div class="volume-slider-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
          </div>
        </div>
      </div>
    </footer>

    <!-- Mobile Bottom Tabs -->
    <nav id="mobile-tabs" class="mobile-tabs">
      <a href="#home" class="tab-item active" data-view="home">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span>Home</span>
      </a>
      <a href="#browse" class="tab-item" data-view="browse">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span>Browse</span>
      </a>
      <a href="#search" class="tab-item" data-view="search">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <span>Search</span>
      </a>
    </nav>
    </div><!-- end main-column -->

    <div id="overlay" class="hidden"></div>

    <!-- Full-Screen Now Playing -->
    <div id="full-player" class="full-player">
      <div class="full-player-bg"></div>
      <div class="full-player-drag"></div>
      <div class="full-player-inner">
        <div class="full-player-top">
          <button id="full-player-close" class="full-player-close">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <span class="full-player-label">Now Playing</span>
          <button id="full-player-menu" class="full-player-close" style="visibility:hidden">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          </button>
        </div>
        <div class="full-player-art-wrapper">
          <div class="full-player-art-inner" id="full-player-art-inner">
            <img id="full-player-art" src="" alt="Album art">
          </div>
        </div>
        <div class="full-player-info">
          <h2 id="full-player-title" class="full-player-title">No track</h2>
          <p id="full-player-artist" class="full-player-artist">Select a song to play</p>
        </div>
        <div class="full-player-progress-wrap">
          <input type="range" id="full-seek-slider" min="0" max="100" value="0" step="0.1" class="full-seek">
          <div class="full-progress-times">
            <span id="full-current-time">0:00</span>
            <span id="full-duration">0:00</span>
          </div>
        </div>
        <div class="full-player-controls">
          <button id="full-shuffle-btn" class="full-control-btn" title="Shuffle">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/>
              <line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/>
              <line x1="15" y1="15" x2="21" y2="21"/>
              <line x1="4" y1="4" x2="9" y2="9"/>
            </svg>
          </button>
          <button id="full-prev-btn" class="full-control-btn" title="Previous">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M19 20L9 12l10-8v16zM5 19V5h2v14H5z"/></svg>
          </button>
          <button id="full-play-btn" class="full-play-main" title="Play">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><polygon points="9,5 20,12 9,19"/></svg>
          </button>
          <button id="full-next-btn" class="full-control-btn" title="Next">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M5 4l10 8-10 8V4zM17 5v14h2V5h-2z"/></svg>
          </button>
          <button id="full-repeat-btn" class="full-control-btn" title="Repeat">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 014-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 01-4 4H3"/>
            </svg>
          </button>
        </div>
        <div class="full-player-lyrics" id="full-player-lyrics">
          <div class="lyrics-container" id="lyrics-container">
            <p class="lyrics-placeholder">Loading lyrics...</p>
          </div>
        </div>
        <div class="full-player-volume">
          <button id="full-volume-btn" class="full-control-btn" title="Volume">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
          </button>
          <div class="full-player-volume-slider">
            <input type="range" id="full-volume-slider" min="0" max="1" step="0.01" value="0.7">
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
